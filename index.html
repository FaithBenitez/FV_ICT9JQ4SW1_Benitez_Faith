<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<style>
    body{
        font-family: 'Roboto', sans-serif;
        background-image: url(https://i.pinimg.com/736x/a7/2b/ee/a72bee3d09a22e22c5d488f8130e0195.jpg);
        background-repeat: no-repeat;
        background-size: cover;
    }

</style>
<body>
    <center>
    <div class="container" style="width: 500px; height: 700px; background-color: rgba(99, 97, 97, 0.916); margin-top: 150px; border-radius: 20px; box-shadow: rgba(0, 0, 0, 0.15) 1.95px 1.95px 2.6px; padding: 20px;">
    
    <h1 style="padding-top: 10px; color: rgb(233, 223, 194);"><b>Login</b></h1>
    <div class="col-sm-5" id="profile">
                <img class="rounded-circle" style="height: 100px; width: 100px;" src ="https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg">
                <br><br>
            
            </div>
    <br>

    <form onsubmit="CheckPassword(); return false;">
      
      <div class="col">
        <label style="font-size: 20px; color: rgb(233, 223, 194);"><b>Enter Username:</b></label>
        <input type="text" id="username" class="form-control" placeholder="Input Username...">

        <br>

        <label style="font-size: 20px; color: rgb(233, 223, 194);"><b>Enter Password:</b></label>
        <input type="password" id="password" class="form-control" placeholder="Input Password..."> 

        <br><br>

 

            <div class="form-check mb-4">
            <input type="checkbox" class="form-check-input" id="checkbox" > 
            <label class="form-check-label" for="checkbox" style="position: center; color: rgb(233, 223, 194);"><b>Stay Logged In</b></label>
            
        </div>

 
        <button type="submit" class="btn" style="color:rgb(233, 223, 194); background-color: rgb(35, 35, 36); width: 300px;"><b>Login</b></button>
        <br><br>
        <button type="reset" class="btn" style="color:rgb(35, 35, 36); background-color: rgb(233, 223, 194); width: 300px;"><b>Cancel</b></button>

        <p id="correctpassword" style="color:rgb(233, 223, 194); "></p>
        <p id="wrongpassword" style="color:rgb(0, 0, 0);"></p>
    
        <h7 style="color: rgb(233, 223, 194);"><u>Forgot username / password?</u></h7>
        
    </div>

    </form>

  </div>

</center>
<script>
function CheckPassword() {
    const rightusername = "faithbenitez";
    const rightpassword = "ilovecatz";

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let correctvalues = (username === rightusername && password === rightpassword);

    switch(correctvalues) {
        case true:
            document.getElementById("correctpassword").innerHTML = "Welcome Back!";
            alert("Login successful.");
            break;

        case false:
            document.getElementById("wrongpassword").innerHTML = "Invalid username or password";
            alert("Login failed.");
            
            break;

    }
    
}
</script>

<br>
</body>
</html>
